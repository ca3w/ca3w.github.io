---
layout: compress
---
<!DOCTYPE html>
<html lang="zh-Hans">
  {% include head.html %}
  <body{% if site.docsmode %} class="docs"{% endif %}>
    {% include sidebar.html %}

    <main id="main" class="with-sidebar">
      {{ content }}

      <button id="menu">
        <i class="icon-menu"></i>
      </button>

      {% if site.editlink %}
      <a id="edit-link" class="only-admin" href="{{site.editlink}}{{page.path}}" target="_blank">
        <i class="icon-edit"></i>
      </a>
      {% endif %}
      {% if site.newlink %}
      <a id="new-link" class="only-admin" href="{{site.newlink}}" target="_blank">
        <i class="icon-plus-square"></i>
      </a>
      {% endif %}
      <a id="archive-org-save" class="only-admin" href="https://web.archive.org/save/" target="_blank">
        <i class="icon-bank"></i>
      </a>
    </main>

    <div id="h2o" class="with-sidebar">
      <div id="h2o-holder"></div>
    </div>

  </body>
</html>
